
[functions.financial-advisor]
enabled = true
verify_jwt = false
import_map = "./functions/financial-advisor/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/financial-advisor/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/financial-advisor/*.html" ]

[functions.stripe-create-checkout]
enabled = true
# Requiere que el usuario esté logueado (el frontend manda su JWT).
verify_jwt = true
entrypoint = "./functions/stripe-create-checkout/index.ts"

[functions.stripe-webhook]
enabled = true
# Stripe llama a esta URL sin JWT de Supabase; la seguridad la da la
# verificación de firma (STRIPE_WEBHOOK_SECRET) dentro de la función.
verify_jwt = false
entrypoint = "./functions/stripe-webhook/index.ts"
